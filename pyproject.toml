[project]
name = "overmind"
dynamic = ["version"]
description = "Daemon to serve shared PyTorch models"
authors = [
    {name = "Proton", email = "feisuzhu@163.com"},
]
dependencies = [
    "daemonize>=2.5.0",
]
requires-python = ">=3.8"
readme = "README.md"
license = {text = "Apache"}

[project.scripts]
overmind-server = "overmind.server:start"
overmind-list = "overmind.cli:list_loaded"
overmind-shutdown= "overmind.cli:shutdown"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm]
distribution = true

[tool.pdm.version]
source = "scm"
